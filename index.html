<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX - GERENCIADOR PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; --green: #28a745; --gray: #555; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* LOGIN */
        #login-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #333; }
        
        /* TABELA DE USUÁRIOS */
        .admin-section { background: #1c1c1c; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .status-ativo { color: var(--green); font-weight: bold; }
        .status-suspenso { color: var(--red); font-weight: bold; }
        .btn-action { padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-right: 5px; font-size: 12px; color: white; }
        
        #admin-panel { display: none; padding: 80px 15px; background: #111; min-height: 100vh; }
        #main-app { display: none; padding-top: 70px; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2 style="color:var(--red)">CLONEFLIX</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-red" id="btn-entrar">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 style="color:var(--red); font-size: 18px;">CLONEFLIX</h1>
            <button id="btn-adm-view" class="btn-red" style="display:none; width:auto; padding: 5px 15px; background:#444">GERENCIAR</button>
        </header>
        <div id="player-area" style="width:100%; aspect-ratio:16/9; background:#000;"><video id="main-video" controls style="width:100%; height:100%;"></video></div>
        <div id="grid-home" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; padding:20px;"></div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="btn-close-admin" style="width:auto; margin-bottom:20px">← VOLTAR AO APP</button>
        
        <div class="admin-section">
            <h3>Cadastrar Novo Cliente</h3>
            <input type="text" id="adm-u" placeholder="Nome">
            <input type="text" id="adm-p" placeholder="Senha">
            <button class="btn-red" id="btn-save-user">CRIAR ACESSO</button>
        </div>

        <div class="admin-section">
            <h3>Lista de Clientes</h3>
            <table>
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-usuarios"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN COM VERIFICAÇÃO DE STATUS
        document.getElementById('btn-entrar').onclick = async () => {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;

            if (u === "Rhuan" && p === "2026") { abrirApp(true); return; }

            const snapshot = await get(ref(db, 'usuarios'));
            let userFound = null;
            snapshot.forEach(child => {
                const data = child.val();
                if(data.user === u && data.pass === p) userFound = data;
            });

            if(userFound) {
                if(userFound.status === "suspenso") alert("Sua conta está suspensa! Entre em contato com o administrador.");
                else abrirApp(false);
            } else {
                alert("Usuário ou senha incorretos.");
            }
        };

        function abrirApp(isAdmin) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(isAdmin) {
                document.getElementById('btn-adm-view').style.display = 'block';
                carregarGerenciador();
            }
        }

        // SALVAR NOVO USUÁRIO COM STATUS ATIVO
        document.getElementById('btn-save-user').onclick = () => {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;
            if(user && pass) {
                push(ref(db, 'usuarios'), { user, pass, status: "ativo" }).then(() => alert("Usuário criado!"));
            }
        };

        // CARREGAR TABELA DE GERENCIAMENTO
        function carregarGerenciador() {
            onValue(ref(db, 'usuarios'), (snap) => {
                const tbody = document.getElementById('tabela-usuarios');
                tbody.innerHTML = "";
                snap.forEach(child => {
                    const key = child.key;
                    const val = child.val();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${val.user}</td>
                        <td class="${val.status === 'ativo' ? 'status-ativo' : 'status-suspenso'}">${val.status.toUpperCase()}</td>
                        <td>
                            <button class="btn-action" style="background:#007bff" onclick="window.mudarStatus('${key}', '${val.status}')">Alternar</button>
                            <button class="btn-action" style="background:red" onclick="window.deletarUsuario('${key}')">Excluir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // FUNÇÕES GLOBAIS DE AÇÃO
        window.mudarStatus = (key, statusAtual) => {
            const novoStatus = statusAtual === "ativo" ? "suspenso" : "ativo";
            update(ref(db, `usuarios/${key}`), { status: novoStatus });
        };

        window.deletarUsuario = (key) => {
            if(confirm("Tem certeza que deseja excluir este cliente?")) {
                remove(ref(db, `usuarios/${key}`));
            }
        };

        document.getElementById('btn-adm-view').onclick = () => {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        };

        document.getElementById('btn-close-admin').onclick = () => {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        };
    </script>
</body>
</html>
