<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX CLOUD PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* LOGIN */
        #login-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; }
        header h1 { color: var(--red); font-size: 1.4rem; margin: 0; }

        /* PLAYER */
        #player-area { width: 100%; background: #000; margin-top: 60px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; }

        /* GRID */
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.75rem; font-weight: bold; text-align: center; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* ADMIN */
        #admin-panel { display: none; padding: 80px 20px; min-height: 100vh; background: #111; }
        .admin-section { background: #1c1c1c; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #262626; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2 style="color:var(--red)">CLONEFLIX</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-red" id="btn-entrar">ENTRAR</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <h1>CLONEFLIX</h1>
            <div style="display:flex; gap:10px;">
                <button id="btn-adm-view" class="btn-red" style="display:none; width:auto; padding: 5px 10px; background:#444">PAINEL</button>
                <button id="btn-back" class="btn-red" style="display:none; width:auto; padding: 5px 10px;">VOLTAR</button>
            </div>
        </header>
        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>
        <div class="container">
            <h3 id="titulo-dinamico" style="color:var(--red)">Categorias</h3>
            <div id="grid-home" class="grid"></div>
            <div id="grid-itens" class="grid" style="display:none"></div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="btn-close-admin" style="width:auto; margin-bottom:20px">← VOLTAR</button>
        <div class="admin-section">
            <h3>Usuários Online</h3>
            <input type="text" id="adm-u" placeholder="Nome">
            <input type="text" id="adm-p" placeholder="Senha">
            <button class="btn-red" id="btn-save-user">CRIAR ACESSO</button>
            <div id="lista-usuarios" style="margin-top:15px"></div>
        </div>
        <div class="admin-section">
            <h3>Postar Conteúdo</h3>
            <input type="text" id="f-nome" placeholder="Nome">
            <input type="text" id="f-cat" placeholder="Categoria">
            <input type="text" id="f-url" placeholder="URL .m3u8">
            <input type="text" id="f-capa" placeholder="Link da Capa">
            <button class="btn-red" id="btn-save-content">POSTAR AGORA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dadosGlobais = {};

        // LOGIN
        document.getElementById('btn-entrar').onclick = async () => {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;

            if (u === "Rhuan" && p === "2026") {
                iniciarApp(true);
                return;
            }

            const snapshot = await get(ref(db, 'usuarios'));
            let autorizado = false;
            snapshot.forEach(child => {
                if(child.val().user === u && child.val().pass === p) autorizado = true;
            });

            if(autorizado) iniciarApp(false);
            else alert("Acesso Inválido!");
        };

        function iniciarApp(isAdmin) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(isAdmin) document.getElementById('btn-adm-view').style.display = 'block';
            carregarDados();
        }

        // CARREGAR DADOS
        function carregarDados() {
            onValue(ref(db, 'conteudo'), (snap) => {
                dadosGlobais = {};
                snap.forEach(item => {
                    const c = item.val();
                    const cat = (c.categoria || "GERAL").toUpperCase();
                    if(!dadosGlobais[cat]) dadosGlobais[cat] = [];
                    dadosGlobais[cat].push(c);
                });
                renderHome();
            });
        }

        function renderHome() {
            const grid = document.getElementById('grid-home');
            grid.innerHTML = "";
            document.getElementById('grid-home').style.display = 'grid';
            document.getElementById('grid-itens').style.display = 'none';
            document.getElementById('btn-back').style.display = 'none';
            
            Object.keys(dadosGlobais).forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '20px';
                card.innerHTML = `<strong>${cat}</strong>`;
                card.onclick = () => renderCat(cat);
                grid.appendChild(card);
            });
        }

        function renderCat(cat) {
            const grid = document.getElementById('grid-itens');
            grid.innerHTML = "";
            document.getElementById('grid-home').style.display = 'none';
            document.getElementById('grid-itens').style.display = 'grid';
            document.getElementById('btn-back').style.display = 'block';

            dadosGlobais[cat].forEach(f => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${f.capa}"><div class="card-name">${f.nome}</div>`;
                card.onclick = () => {
                    const v = document.getElementById('main-video');
                    if(Hls.isSupported()){
                        const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(v);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
                    }
                    window.scrollTo(0,0);
                };
                grid.appendChild(card);
            });
        }

        // ADMIN
        document.getElementById('btn-adm-view').onclick = () => {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            listarUsers();
        };

        document.getElementById('btn-close-admin').onclick = () => {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        };

        document.getElementById('btn-save-user').onclick = () => {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;
            if(user && pass) push(ref(db, 'usuarios'), { user, pass });
        };

        document.getElementById('btn-save-content').onclick = () => {
            const content = {
                nome: document.getElementById('f-nome').value,
                categoria: document.getElementById('f-cat').value,
                url: document.getElementById('f-url').value,
                capa: document.getElementById('f-capa').value
            };
            if(content.nome && content.url) push(ref(db, 'conteudo'), content);
        };

        function listarUsers() {
            onValue(ref(db, 'usuarios'), snap => {
                const div = document.getElementById('lista-usuarios');
                div.innerHTML = "";
                snap.forEach(u => {
                    const row = document.createElement('div');
                    row.className = 'user-item';
                    row.innerHTML = `<span>${u.val().user}</span><button onclick="window.delU('${u.key}')">Excluir</button>`;
                    div.appendChild(row);
                });
            });
        }

        window.delU = (key) => remove(ref(db, 'usuarios/' + key));
        document.getElementById('btn-back').onclick = renderHome;
    </script>
</body>
</html>
