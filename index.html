<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLONEFLIX ADM</title>
    <script type="module">
        // Importações necessárias para o Firebase v10+
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Suas chaves exatas das imagens
        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Função para criar usuário
        window.criarUsuario = function() {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;

            if (user && pass) {
                // Referência para a pasta 'usuarios' no seu banco
                const usuariosRef = ref(db, 'usuarios');
                
                push(usuariosRef, {
                    user: user,
                    pass: pass,
                    dataCriacao: new Date().toISOString()
                })
                .then(() => {
                    alert("✅ Usuário " + user + " criado com sucesso!");
                    document.getElementById('adm-u').value = "";
                    document.getElementById('adm-p').value = "";
                })
                .catch((error) => {
                    console.error(error);
                    alert("❌ Erro ao salvar: " + error.message);
                });
            } else {
                alert("Preencha todos os campos!");
            }
        };
    </script>
    <style>
        body { background: #141414; color: white; font-family: Arial; padding: 20px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 85%; padding: 12px; background: #E50914; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>PAINEL DE CONTROLE</h2>
    <input type="text" id="adm-u" placeholder="Nome do Usuário">
    <input type="text" id="adm-p" placeholder="Senha do Usuário">
    <button onclick="window.criarUsuario()">CRIAR NO FIREBASE</button>
</body>
</html>
