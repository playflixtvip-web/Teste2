<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAINEL ADMINISTRATIVO - CLONEFLIX</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #000; --red: #E50914; --card: #141414; --text: #fff; --gray: #333; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: none; background: var(--gray); color: #fff; box-sizing: border-box; font-size: 14px; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #main-content { display: none; padding-top: 60px; }
        #player-area { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 60px; z-index: 900; }
        video { width: 100%; height: 100%; }
        .row { padding: 15px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        #admin-panel { display: none; padding: 80px 15px 40px; background: #0a0a0a; min-height: 100vh; }
        .admin-box { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #222; }
        h3 { color: var(--red); margin: 0 0 15px 0; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tabela-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; }
        th { text-align: left; color: #888; padding: 8px; border-bottom: 1px solid #333; }
        td { padding: 8px; border-bottom: 1px solid #222; vertical-align: middle; }
        .btn-acao { padding: 6px 8px; border-radius: 3px; border: none; color: #fff; cursor: pointer; font-size: 10px; font-weight: bold; margin-right: 2px; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div class="login-box" style="text-align:center; background:#111; padding:30px; border-radius:8px; border:1px solid #333; width:85%; max-width:350px;">
            <h1 style="color:var(--red); margin-bottom: 20px;">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="b-e">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="main-content">
        <header><h2 style="color:var(--red); margin:0; font-size: 20px;">CLONEFLIX</h2><button id="b-a" class="btn-red" style="display:none; width:auto; padding:5px 12px; font-size:11px;">PAINEL ADM</button></header>
        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>
        <div id="vitrine"></div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="b-v" style="width:auto; margin-bottom:20px">← VOLTAR AO APP</button>

        <div class="admin-box">
            <h3>Importar Lista (Texto M3U)</h3>
            <textarea id="m3u-i" placeholder="Cole o texto #EXTINF aqui para importar muitos canais de uma vez..."></textarea>
            <button class="btn-red" id="btn-imp" style="background:#28a745">IMPORTAR LISTA AGORA</button>
        </div>

        <div class="admin-box">
            <h3>Gerenciar Clientes</h3>
            <div style="display:flex; gap:5px; margin-bottom: 10px;">
                <input type="hidden" id="edit-user-id">
                <input id="a-u" placeholder="Novo Usuário" style="margin:0">
                <input id="a-p" placeholder="Senha" style="margin:0">
                <button id="b-c-u" class="btn-red" style="width:80px; margin:0">SALVAR</button>
            </div>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>USUÁRIO</th><th>SENHA</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-u"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h3 id="t-f">Adicionar/Editar Conteúdo</h3>
            <input type="hidden" id="e-id">
            <input type="text" id="f-n" placeholder="Título (Ex: Globo HD)">
            <input type="text" id="f-c" placeholder="Categoria (Ex: CANAIS ABERTOS)">
            <input type="text" id="f-u" placeholder="Link do Stream (.m3u8)">
            <input type="text" id="f-p" placeholder="Link da Capa/Logo">
            <button class="btn-red" id="b-s">PUBLICAR AGORA</button>
        </div>

        <div class="admin-box">
            <h3>Meus Conteúdos</h3>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>TÍTULO</th><th>CATEGORIA</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-c"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // LOGIN ADM
        document.getElementById('b-e').onclick = () => { 
            if(document.getElementById('u-l').value==="Rhuan" && document.getElementById('p-l').value==="2026"){ 
                document.getElementById('login-container').style.display='none'; 
                document.getElementById('main-content').style.display='block'; 
                document.getElementById('b-a').style.display='block'; 
                carregar(); 
            } else { alert("Login Administrativo Inválido"); }
        };

        function carregar() {
            // CARREGAR CONTEÚDO (VITRINE E LISTA ADM)
            onValue(ref(db, 'conteudo'), (s) => {
                const v = document.getElementById('vitrine'); v.innerHTML = ""; let cats = {};
                const lc = document.getElementById('l-c'); lc.innerHTML = "";
                s.forEach(i => {
                    const d = i.val(); const k = i.key;
                    if(!cats[d.categoria]) cats[d.categoria] = []; cats[d.categoria].push(d);
                    lc.innerHTML += `<tr><td>${d.nome}</td><td>${d.categoria}</td><td><button class="btn-acao" style="background:#007bff" onclick="window.edit('${k}')">EDIT</button><button class="btn-acao" style="background:red" onclick="window.del('${k}')">X</button></td></tr>`;
                });
                for(let c in cats){
                    const r = document.createElement('div'); r.className='row'; r.innerHTML=`<div style="font-size:14px; font-weight:bold; margin-bottom:10px; color:#ccc">${c}</div><div class="grid" id="g-${c.replace(/\s+/g, '')}"></div>`; v.appendChild(r);
                    cats[c].forEach(f => {
                        const card = document.createElement('div'); card.className='card'; card.innerHTML=`<img src="${f.capa}"><div style="font-size:9px; text-align:center; padding:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.nome}</div>`;
                        card.onclick = () => { if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(document.getElementById('main-video')); hls.on(Hls.Events.MANIFEST_PARSED, ()=>document.getElementById('main-video').play()); } window.scrollTo(0,0); };
                        document.getElementById('g-'+c.replace(/\s+/g, '')).appendChild(card);
                    });
                }
            });

            // CARREGAR USUÁRIOS
            onValue(ref(db, 'usuarios'), (s) => {
                const lu = document.getElementById('l-u'); lu.innerHTML = "";
                s.forEach(i => { 
                    const k = i.key; const v = i.val(); 
                    lu.innerHTML += `<tr><td>${v.user}</td><td>${v.pass}</td><td style="color:${v.status=='ativo'?'#28a745':'#ffc107'}">${v.status.toUpperCase()}</td><td>
                        <button class="btn-acao" style="background:#444" onclick="window.st('${k}','${v.status}')">ST</button>
                        <button class="btn-acao" style="background:#007bff" onclick="window.editU('${k}')">EDIT</button>
                        <button class="btn-acao" style="background:red" onclick="window.delU('${k}')">X</button></td></tr>`; 
                });
            });
        }

        // FUNÇÕES GLOBAIS DE CONTEÚDO
        window.del = (k) => confirm("Excluir conteúdo?") && remove(ref(db, `conteudo/${k}`));
        window.edit = async (k) => { 
            const d = (await get(ref(db, `conteudo/${k}`))).val(); 
            document.getElementById('e-id').value=k; document.getElementById('f-n').value=d.nome; 
            document.getElementById('f-c').value=d.categoria; document.getElementById('f-u').value=d.url; 
            document.getElementById('f-p').value=d.capa; document.getElementById('t-f').innerText="EDITANDO: "+d.nome; window.scrollTo(0,400); 
        };

        // FUNÇÕES GLOBAIS DE USUÁRIO
        window.delU = (k) => confirm("Excluir usuário?") && remove(ref(db, `usuarios/${k}`));
        window.st = (k, s) => update(ref(db, `usuarios/${k}`), {status: s=='ativo'?'suspenso':'ativo'});
        window.editU = async (k) => {
            const d = (await get(ref(db, `usuarios/${k}`))).val();
            document.getElementById('edit-user-id').value = k;
            document.getElementById('a-u').value = d.user;
            document.getElementById('a-p').value = d.pass;
        };

        // BOTÕES DE SALVAR
        document.getElementById('b-s').onclick = () => {
            const id = document.getElementById('e-id').value; 
            const obj = { nome: document.getElementById('f-n').value, categoria: document.getElementById('f-c').value.toUpperCase(), url: document.getElementById('f-u').value, capa: document.getElementById('f-p').value };
            if(id) update(ref(db, `conteudo/${id}`), obj).then(()=>{ alert("Conteúdo Atualizado!"); document.getElementById('e-id').value=""; document.getElementById('t-f').innerText="Adicionar/Editar Conteúdo"; });
            else push(ref(db, 'conteudo'), obj).then(()=>alert("Novo Conteúdo Postado!"));
        };

        document.getElementById('b-c-u').onclick = () => {
            const id = document.getElementById('edit-user-id').value;
            const dados = { user: document.getElementById('a-u').value, pass: document.getElementById('a-p').value, status: 'ativo' };
            if(id) update(ref(db, `usuarios/${id}`), dados).then(() => { alert("Usuário Atualizado!"); document.getElementById('edit-user-id').value = ""; });
            else push(ref(db, 'usuarios'), dados).then(() => alert("Usuário Criado!"));
        };

        // IMPORTAR M3U (MUITOS DE UMA VEZ)
        document.getElementById('btn-imp').onclick = async () => {
            const linhas = document.getElementById('m3u-i').value.split('\n'); let t = 0;
            for(let i=0; i<linhas.length; i++){
                if(linhas[i].includes('#EXTINF')){
                    const info = linhas[i]; const url = linhas[i+1]?.trim();
                    if(url && url.startsWith('http')){
                        const n = info.split(',')[1] || "Sem Nome"; 
                        const c = info.includes('group-title="') ? info.split('group-title="')[1].split('"')[0] : "GERAL"; 
                        const p = info.includes('tvg-logo="') ? info.split('tvg-logo="')[1].split('"')[0] : "";
                        await push(ref(db, 'conteudo'), { nome: n.trim(), categoria: c.toUpperCase(), url: url, capa: p }); t++;
                    }
                }
            }
            alert(t + " Itens importados com sucesso!"); document.getElementById('m3u-i').value="";
        };

        document.getElementById('b-a').onclick = () => { document.getElementById('main-content').style.display='none'; document.getElementById('admin-panel').style.display='block'; };
        document.getElementById('b-v').onclick = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('main-content').style.display='block'; };
    </script>
</body>
</html>
