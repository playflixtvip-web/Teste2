<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX - GERENCIADOR TOTAL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; --green: #28a745; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* LOGIN */
        #login-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #333; }
        
        /* PAINEL ADM */
        #admin-panel { display: none; padding: 80px 15px; background: #111; min-height: 100vh; }
        .admin-section { background: #1c1c1c; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* TABELA */
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; background: #222; margin-bottom: 5px; border-radius: 5px; flex-wrap: wrap; }
        .user-info { flex: 1; min-width: 150px; }
        .user-name { font-weight: bold; display: block; }
        .user-status { font-size: 12px; text-transform: uppercase; }
        .status-ativo { color: var(--green); }
        .status-suspenso { color: var(--red); }
        
        .actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-sm { padding: 6px 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 11px; }
        
        #main-app { display: none; padding-top: 70px; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2 style="color:var(--red)">CLONEFLIX</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-red" id="btn-entrar">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 style="color:var(--red); font-size: 18px;">CLONEFLIX</h1>
            <button id="btn-adm-view" class="btn-red" style="display:none; width:auto; padding: 5px 15px; background:#444">GERENCIAR</button>
        </header>
        <div id="player-area" style="width:100%; aspect-ratio:16/9; background:#000;"><video id="main-video" controls style="width:100%; height:100%;"></video></div>
        <div id="grid-home" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; padding:20px;"></div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="btn-close-admin" style="width:auto; margin-bottom:20px">← VOLTAR</button>
        
        <div class="admin-section">
            <h3>Novo Cliente</h3>
            <input type="text" id="adm-u" placeholder="Nome">
            <input type="text" id="adm-p" placeholder="Senha">
            <button class="btn-red" id="btn-save-user">CRIAR AGORA</button>
        </div>

        <div class="admin-section">
            <h3>Usuários no Banco</h3>
            <div id="lista-clientes">Carregando usuários...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN
        document.getElementById('btn-entrar').onclick = async () => {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;

            if (u === "Rhuan" && p === "2026") { abrirApp(true); return; }

            const snapshot = await get(ref(db, 'usuarios'));
            let valid = false;
            snapshot.forEach(c => {
                const d = c.val();
                if(d.user === u && d.pass === p) {
                    if(d.status === "suspenso") { alert("Conta suspensa!"); return; }
                    valid = true;
                }
            });
            if(valid) abrirApp(false);
            else alert("Dados incorretos!");
        };

        function abrirApp(isAdmin) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(isAdmin) {
                document.getElementById('btn-adm-view').style.display = 'block';
                monitorarUsuarios();
            }
        }

        // SALVAR
        document.getElementById('btn-save-user').onclick = () => {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;
            if(user && pass) {
                push(ref(db, 'usuarios'), { user, pass, status: "ativo" })
                .then(() => { alert("Criado!"); document.getElementById('adm-u').value=""; document.getElementById('adm-p').value=""; });
            }
        };

        // LISTA EM TEMPO REAL
        function monitorarUsuarios() {
            onValue(ref(db, 'usuarios'), (snap) => {
                const container = document.getElementById('lista-clientes');
                container.innerHTML = "";
                
                snap.forEach(child => {
                    const key = child.key;
                    const val = child.val();
                    const div = document.createElement('div');
                    div.className = 'user-row';
                    div.innerHTML = `
                        <div class="user-info">
                            <span class="user-name">${val.user}</span>
                            <span class="user-status ${val.status === 'ativo' ? 'status-ativo' : 'status-suspenso'}">${val.status}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-sm" style="background:#007bff" id="status-${key}">Alternar</button>
                            <button class="btn-sm" style="background:red" id="del-${key}">Excluir</button>
                        </div>
                    `;
                    container.appendChild(div);

                    // BOTÕES (Eventos diretos para não falhar)
                    document.getElementById(`status-${key}`).onclick = () => {
                        const nStatus = val.status === 'ativo' ? 'suspenso' : 'ativo';
                        update(ref(db, `usuarios/${key}`), { status: nStatus });
                    };
                    document.getElementById(`del-${key}`).onclick = () => {
                        if(confirm("Excluir " + val.user + "?")) remove(ref(db, `usuarios/${key}`));
                    };
                });
            });
        }

        document.getElementById('btn-adm-view').onclick = () => {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        };
        document.getElementById('btn-close-admin').onclick = () => {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        };
    </script>
</body>
</html>
