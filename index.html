<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* LOGIN */
        #login-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20,20,20,0.95); padding: 40px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* HEADER E APP */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #333; }
        #player-area { width: 100%; background: #000; margin-top: 60px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 6px; overflow: hidden; cursor: pointer; text-align: center; border: 1px solid #333; padding-bottom: 5px;}
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* PAINEL ADM */
        #admin-panel { display: none; padding: 80px 20px; min-height: 100vh; background: #111; }
        .admin-section { background: #1c1c1c; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2 style="color:var(--red)">CLONEFLIX</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-red" id="btn-entrar">ENTRAR</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <h1 style="color:var(--red); font-size: 20px;">CLONEFLIX</h1>
            <button id="btn-adm-view" class="btn-red" style="display:none; width:auto; padding: 5px 15px; background:#444">PAINEL ADM</button>
        </header>
        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>
        <div class="container">
            <h3 id="titulo-dinamico" style="color:var(--red)">Início</h3>
            <div id="grid-home" class="grid"></div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="btn-close-admin" style="width:auto; margin-bottom:20px">← VOLTAR AO APP</button>
        
        <div class="admin-section">
            <h3>Criar Novo Acesso</h3>
            <input type="text" id="adm-u" placeholder="Nome do Cliente">
            <input type="text" id="adm-p" placeholder="Senha">
            <button class="btn-red" id="btn-save-user">SALVAR NO FIREBASE</button>
        </div>

        <div class="admin-section">
            <h3>Postar Conteúdo (M3U8)</h3>
            <input type="text" id="f-nome" placeholder="Nome do Filme">
            <input type="text" id="f-cat" placeholder="Categoria">
            <input type="text" id="f-url" placeholder="Link .m3u8">
            <input type="text" id="f-capa" placeholder="Link da Capa">
            <button class="btn-red" id="btn-save-content">PUBLICAR AGORA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // AÇÃO DE LOGIN
        document.getElementById('btn-entrar').onclick = async () => {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;

            // Se for você (Dono)
            if (u === "Rhuan" && p === "2026") {
                abrirApp(true);
                return;
            }

            // Busca no Firebase se o usuário existe
            const snapshot = await get(ref(db, 'usuarios'));
            let autorizado = false;
            snapshot.forEach(child => {
                if(child.val().user === u && child.val().pass === p) autorizado = true;
            });

            if(autorizado) abrirApp(false);
            else alert("Acesso negado! Usuário ou senha incorretos.");
        };

        function abrirApp(isAdmin) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            if(isAdmin) document.getElementById('btn-adm-view').style.display = 'block';
            carregarFilmes();
        }

        // CARREGAR FILMES DO BANCO
        function carregarFilmes() {
            onValue(ref(db, 'conteudo'), (snap) => {
                const grid = document.getElementById('grid-home');
                grid.innerHTML = "";
                snap.forEach(item => {
                    const f = item.val();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${f.capa}"><br><small>${f.nome}</small>`;
                    card.onclick = () => {
                        const v = document.getElementById('main-video');
                        if(Hls.isSupported()){
                            const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(v);
                            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
                        }
                    };
                    grid.appendChild(card);
                });
            });
        }

        // FUNÇÕES DO PAINEL ADM
        document.getElementById('btn-save-user').onclick = () => {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;
            if(user && pass) {
                push(ref(db, 'usuarios'), { user, pass }).then(() => alert("Usuário salvo!"));
            }
        };

        document.getElementById('btn-save-content').onclick = () => {
            const data = {
                nome: document.getElementById('f-nome').value,
                categoria: document.getElementById('f-cat').value,
                url: document.getElementById('f-url').value,
                capa: document.getElementById('f-capa').value
            };
            push(ref(db, 'conteudo'), data).then(() => alert("Filme Postado!"));
        };

        document.getElementById('btn-adm-view').onclick = () => {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        };

        document.getElementById('btn-close-admin').onclick = () => {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        };
    </script>
</body>
</html>
