<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0b0b0b; --red: #E50914; --card: #141414; --text: #fff; --gray: #2a2a2a; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); display: flex; align-items: center; padding: 0 15px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #222; }
        .btn-red { padding: 12px; background: var(--red); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: var(--gray); color: #fff; box-sizing: border-box; }
        
        #main-content { display: none; padding-top: 60px; }
        #player-area { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 60px; z-index: 900; display: none; border-bottom: 2px solid var(--red); }
        video { width: 100%; height: 100%; }

        .category-item { background: #1a1a1a; padding: 18px; margin: 8px 15px; border-radius: 8px; cursor: pointer; border-left: 5px solid var(--red); font-weight: bold; display: flex; justify-content: space-between; }
        #detalhe-categoria { display: none; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }

        /* PAINEL ADM */
        #admin-panel { display: none; padding: 80px 15px 40px; background: #000; min-height: 100vh; }
        .admin-box { background: #141414; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        .admin-box h3 { color: var(--red); margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .tabela-container { overflow-x: auto; margin-top: 10px; background: #0c0c0c; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td, th { padding: 10px; border-bottom: 1px solid #1a1a1a; text-align: left; }
        .btn-mini { padding: 5px 8px; border-radius: 4px; border: none; color: white; cursor: pointer; margin-right: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center; background:#141414; padding:35px; border-radius:15px; border:1px solid #333; width:85%; max-width:340px;">
            <h1 style="color:var(--red); margin-bottom: 30px; font-size: 28px;">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="b-e" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h2 style="color:var(--red); margin:0;">CLONEFLIX</h2>
            <div style="display: flex; gap: 8px;">
                <button id="b-a" class="btn-red" style="display:none; padding: 8px 12px;">ADM</button>
                <button class="btn-red" style="background:#333" onclick="location.reload()">SAIR</button>
            </div>
        </header>
        <div id="player-area"><video id="main-video" controls playsinline></video></div>
        <div id="user-info" style="padding:15px; font-size:12px; color:#aaa; background:#111;">
            <b>SEU ACESSO:</b> <span id="txt-validade" style="color:var(--red)">---</span>
        </div>
        <div id="lista-categorias"></div>
        <div id="detalhe-categoria">
            <button class="btn-red" id="btn-voltar-cat" style="width:100%; margin-bottom:20px; background:#222;">← VOLTAR PARA GRUPOS</button>
            <h3 id="nome-cat-titulo" style="border-left: 4px solid var(--red); padding-left: 12px;"></h3>
            <div class="grid" id="grid-conteudo"></div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; margin-bottom: 25px;">
            <button class="btn-red" id="b-v-adm" style="background:#333">← VOLTAR AO APP</button>
            <button class="btn-red" onclick="location.reload()">LOGOUT</button>
        </div>

        <div class="admin-box">
            <h3>Adicionar Filme ou Canal</h3>
            <input type="hidden" id="edit-cont-id">
            <input id="c-n" placeholder="Nome do Conteúdo">
            <input id="c-c" placeholder="Categoria (Ex: FILMES, CANAIS)">
            <input id="c-u" placeholder="URL do Conteúdo (.m3u8)">
            <input id="c-p" placeholder="URL da Imagem (Capa)">
            <button class="btn-red" id="btn-salvar-manual" style="width:100%">PUBLICAR PARA TODOS</button>
        </div>

        <div class="admin-box">
            <h3>Gerenciar Usuários</h3>
            <div style="display:flex; flex-wrap:wrap; gap:5px;">
                <input type="hidden" id="edit-user-id">
                <input id="a-u" placeholder="Usuário" style="flex:1">
                <input id="a-p" placeholder="Senha" style="flex:1">
                <input id="a-d" type="number" placeholder="Dias" style="width:60px">
                <button id="b-c-u" class="btn-red" style="width:100%">CRIAR ACESSO ONLINE</button>
            </div>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>NOME</th><th>VALIDADE</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-u"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h3>Conteúdos no Banco</h3>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>NOME</th><th>GRUPO</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-c"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        let dadosConteudo = {};
        const video = document.getElementById('main-video');
        const playerArea = document.getElementById('player-area');
        let currentId = "";

        // LOGIN COM TRAVA DE EXPIRAÇÃO E STATUS
        document.getElementById('b-e').onclick = async () => {
            const user = document.getElementById('u-l').value;
            const pass = document.getElementById('p-l').value;
            
            if(user === "Rhuan" && pass === "2026") return logado(true, "ADMINISTRADOR");

            const snap = await get(ref(db, 'usuarios'));
            let v = null;
            snap.forEach(i => { if(i.val().user === user && i.val().pass === pass) v = i.val(); });

            if(v) {
                // Verificar Status
                if(v.status === 'suspenso') return alert("Seu acesso foi SUSPENSO! Fale com o suporte.");
                
                // Verificar Validade
                const agora = new Date().getTime();
                if(v.expira !== "Vitalício" && agora > v.expira) {
                    return alert("Seu acesso EXPIROU! Você precisa renovar para continuar assistindo.");
                }

                let tempoRestante = v.expira === "Vitalício" ? "VITALÍCIO" : Math.ceil((v.expira - agora)/(1000*60*60*24)) + " DIAS RESTANTES";
                logado(false, tempoRestante);
            } else {
                alert("Usuário ou Senha incorretos!");
            }
        };

        function logado(adm, val) {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            document.getElementById('txt-validade').innerText = val;
            if(adm) document.getElementById('b-a').style.display='block';
            carregar();
        }

        function carregar() {
            onValue(ref(db, 'conteudo'), (s) => {
                dadosConteudo = {}; const tabC = document.getElementById('l-c'); tabC.innerHTML = "";
                s.forEach(i => {
                    const d = i.val(); const k = i.key;
                    if(!dadosConteudo[d.categoria]) dadosConteudo[d.categoria] = [];
                    dadosConteudo[d.categoria].push({...d, k});
                    tabC.innerHTML += `<tr><td>${d.nome}</td><td>${d.categoria}</td><td>
                        <button class="btn-mini" style="background:#007bff" onclick="window.editC('${k}')">ED</button>
                        <button class="btn-mini" style="background:red" onclick="window.delC('${k}')">X</button></td></tr>`;
                });
                renderCategorias();
            });

            onValue(ref(db, 'usuarios'), (s) => {
                const tabU = document.getElementById('l-u'); tabU.innerHTML = "";
                s.forEach(i => {
                    const k = i.key; const v = i.val();
                    let resto = v.expira === "Vitalício" ? "VIT" : Math.ceil((v.expira - new Date().getTime())/(1000*60*60*24))+"d";
                    let corStatus = v.status === 'ativo' ? '#28a745' : '#555';
                    tabU.innerHTML += `<tr><td>${v.user}</td><td>${resto}</td><td>
                        <button class="btn-mini" style="background:${corStatus}" onclick="window.stU('${k}','${v.status}')">ST</button>
                        <button class="btn-mini" style="background:#007bff" onclick="window.editU('${k}')">ED</button>
                        <button class="btn-mini" style="background:red" onclick="window.delU('${k}')">X</button></td></tr>`;
                });
            });
        }

        function renderCategorias() {
            const lista = document.getElementById('lista-categorias'); lista.innerHTML = "";
            Object.keys(dadosConteudo).sort().forEach(cat => {
                const div = document.createElement('div'); div.className = 'category-item'; div.innerHTML = `<span>${cat}</span> <span>❯</span>`;
                div.onclick = () => {
                    document.getElementById('lista-categorias').style.display='none';
                    document.getElementById('detalhe-categoria').style.display='block';
                    document.getElementById('nome-cat-titulo').innerText = cat;
                    const grid = document.getElementById('grid-conteudo'); grid.innerHTML = "";
                    dadosConteudo[cat].forEach(f => {
                        const card = document.createElement('div'); card.className='card'; card.innerHTML=`<img src="${f.capa}"><div style="font-size:10px; padding:5px; color:#ccc;">${f.nome}</div>`;
                        card.onclick = () => {
                            currentId = f.k; playerArea.style.display = 'block';
                            if(Hls.isSupported()){
                                const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                    const saved = localStorage.getItem('time_'+f.k);
                                    if(saved && confirm("Retomar de onde parou?")) video.currentTime = parseFloat(saved);
                                    video.play();
                                });
                            }
                            window.scrollTo(0,0);
                        };
                        grid.appendChild(card);
                    });
                };
                lista.appendChild(div);
            });
        }

        document.getElementById('btn-voltar-cat').onclick = () => {
            video.pause(); video.src = ""; playerArea.style.display = 'none';
            document.getElementById('detalhe-categoria').style.display='none';
            document.getElementById('lista-categorias').style.display='block';
        };

        // SALVAR MANUAL / EDITAR CONTEÚDO
        document.getElementById('btn-salvar-manual').onclick = () => {
            const id = document.getElementById('edit-cont-id').value;
            const obj = { nome: document.getElementById('c-n').value, categoria: document.getElementById('c-c').value.toUpperCase(), url: document.getElementById('c-u').value, capa: document.getElementById('c-p').value };
            if(id) update(ref(db, `conteudo/${id}`), obj).then(() => { document.getElementById('edit-cont-id').value=""; alert("Editado!"); });
            else push(ref(db, 'conteudo'), obj).then(() => alert("Publicado!"));
            document.getElementById('c-n').value=""; document.getElementById('c-c').value=""; document.getElementById('c-u').value=""; document.getElementById('c-p').value="";
        };

        // SALVAR USUÁRIO
        document.getElementById('b-c-u').onclick = () => {
            const id = document.getElementById('edit-user-id').value;
            const dias = document.getElementById('a-d').value;
            let exp = dias ? new Date().getTime() + (dias * 24 * 60 * 60 * 1000) : "Vitalício";
            const obj = { user: document.getElementById('a-u').value, pass: document.getElementById('a-p').value, expira: exp, status: 'ativo' };
            if(id) update(ref(db, `usuarios/${id}`), obj).then(() => { document.getElementById('edit-user-id').value=""; alert("Salvo!"); });
            else push(ref(db, 'usuarios'), obj).then(() => alert("Criado!"));
            document.getElementById('a-u').value=""; document.getElementById('a-p').value=""; document.getElementById('a-d').value="";
        };

        window.editC = async (k) => {
            const d = (await get(ref(db, `conteudo/${k}`))).val();
            document.getElementById('edit-cont-id').value = k;
            document.getElementById('c-n').value = d.nome; document.getElementById('c-c').value = d.categoria; document.getElementById('c-u').value = d.url; document.getElementById('c-p').value = d.capa;
            window.scrollTo(0, 100);
        };

        window.editU = async (k) => { 
            const d = (await get(ref(db, `usuarios/${k}`))).val();
            document.getElementById('edit-user-id').value=k; document.getElementById('a-u').value=d.user; document.getElementById('a-p').value=d.pass;
        };

        window.stU = (k, s) => update(ref(db, `usuarios/${k}`), { status: s === 'ativo' ? 'suspenso' : 'ativo' });
        window.delU = (k) => confirm("Deletar Usuário?") && remove(ref(db, `usuarios/${k}`));
        window.delC = (k) => confirm("Deletar Conteúdo?") && remove(ref(db, `conteudo/${k}`));

        document.getElementById('b-a').onclick = () => { document.getElementById('main-content').style.display='none'; document.getElementById('admin-panel').style.display='block'; };
        document.getElementById('b-v-adm').onclick = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('main-content').style.display='block'; };
        setInterval(() => { if(!video.paused && currentId) localStorage.setItem('time_'+currentId, video.currentTime); }, 5000);
    </script>
</body>
</html>
