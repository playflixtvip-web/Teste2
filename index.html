<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX PRO - ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #141414; --red: #E50914; --card-bg: #222; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* LOGIN */
        #login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 8px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 20px rgba(229, 9, 20, 0.3); }
        .login-box h2 { color: var(--red); margin-bottom: 25px; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* APP */
        #main-app, #admin-panel { display: none; }
        header { position: fixed; top: 0; width: 100%; height: 55px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid #333; box-sizing: border-box; justify-content: space-between; }
        header h1 { color: var(--red); font-size: 1.2rem; margin: 0; font-weight: bold; }
        
        .nav-btns { display: flex; gap: 10px; }
        .btn-acao { background: var(--red); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        #player-area { position: relative; width: 100%; background: #000; margin-top: 55px; aspect-ratio: 16/9; z-index: 900; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        .container { padding: 20px; }
        #status-titulo { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #fff; text-transform: uppercase; border-left: 4px solid var(--red); padding-left: 10px; }
        
        .grid-categorias { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-categoria { background: #222; padding: 20px; border-radius: 6px; cursor: pointer; font-weight: bold; border-left: 5px solid var(--red); display: flex; align-items: center; justify-content: space-between; }

        #grid-conteudo { display: none; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .card { background: var(--card-bg); border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .card:hover { border-color: var(--red); transform: scale(1.05); }
        .card-img { width: 100%; height: 150px; background: #333; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-nome { padding: 8px; font-size: 0.7rem; font-weight: bold; text-align: center; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* PAINEL ADMIN - USUÁRIOS */
        .admin-section { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .admin-section h3 { margin-top: 0; color: var(--red); }
        .admin-section input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .user-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .btn-delete { background: #ff4444; border: none; color: white; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        @media (orientation: landscape) {
            #player-area { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; margin-top: 0; z-index: 2000; }
            header, .container { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>CLONEFLIX</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1>CLONEFLIX</h1>
            <div class="nav-btns">
                <button id="btn-admin" class="btn-acao" style="display:none; background: #555;" onclick="abrirAdmin()">GERENCIAR</button>
                <button id="btn-voltar" class="btn-acao" onclick="voltarParaCategorias()" style="display:none;">VOLTAR</button>
            </div>
        </header>
        <div id="player-area"><video id="video" controls autoplay playsinline></video></div>
        <div class="container">
            <div id="status-titulo">Categorias</div>
            <div id="grid-categorias" class="grid-categorias"></div>
            <div id="grid-conteudo"></div>
        </div>
    </div>

    <div id="admin-panel">
        <header>
            <h1>GERENCIAMENTO</h1>
            <button class="btn-acao" onclick="fecharAdmin()">FECHAR</button>
        </header>
        <div class="container" style="margin-top: 60px;">
            
            <div class="admin-section">
                <h3>Criar Novo Usuário</h3>
                <input type="text" id="new-username" placeholder="Nome do Usuário">
                <input type="password" id="new-password" placeholder="Senha">
                <button class="btn-acao" style="width: 100%" onclick="adicionarUsuario()">SALVAR USUÁRIO</button>
            </div>

            <div class="admin-section">
                <h3>Lista de Usuários</h3>
                <div id="lista-usuarios-admin"></div>
            </div>

            <div class="admin-section">
                <h3>Adicionar Filme/Canal</h3>
                <input type="text" id="adm-nome" placeholder="Nome">
                <input type="text" id="adm-cat" placeholder="Categoria">
                <input type="text" id="adm-url" placeholder="URL .m3u8">
                <input type="text" id="adm-capa" placeholder="URL da Capa">
                <button class="btn-acao" style="width: 100%; background: #444;" onclick="salvarNovoFilme()">SALVAR CONTEÚDO</button>
            </div>

        </div>
    </div>

<script>
    // Link do seu GitHub (Substitua aqui!)
    const URL_M3U_GITHUB = "SUA_URL_DO_GITHUB_AQUI"; 

    // Configuração inicial de usuários
    let usuarios = JSON.parse(localStorage.getItem('usuariosApp')) || [
        { user: "Rhuan", pass: "321", isAdmin: true } // Dono padrão
    ];

    let dadosAgrupados = {};
    let listaM3U = "";

    // --- SISTEMA DE LOGIN ---
    function fazerLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        const conta = usuarios.find(item => item.user === u && item.pass === p);

        if (conta) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // Se for Rhuan, mostra o botão Gerenciar
            if (conta.isAdmin) {
                document.getElementById('btn-admin').style.display = 'block';
            }
            carregarCanais();
        } else {
            alert("Login inválido!");
        }
    }

    // --- GERENCIAMENTO DE USUÁRIOS (SÓ RHUAN PODE) ---
    function adicionarUsuario() {
        const u = document.getElementById('new-username').value;
        const p = document.getElementById('new-password').value;

        if (!u || !p) return alert("Preencha tudo!");

        usuarios.push({ user: u, pass: p, isAdmin: false });
        localStorage.setItem('usuariosApp', JSON.stringify(usuarios));
        
        document.getElementById('new-username').value = "";
        document.getElementById('new-password').value = "";
        renderizarListaUsuarios();
        alert("Usuário criado com sucesso!");
    }

    function excluirUsuario(index) {
        if (usuarios[index].isAdmin) return alert("Você não pode excluir o Dono!");
        if (confirm("Deseja excluir este usuário?")) {
            usuarios.splice(index, 1);
            localStorage.setItem('usuariosApp', JSON.stringify(usuarios));
            renderizarListaUsuarios();
        }
    }

    function renderizarListaUsuarios() {
        const div = document.getElementById('lista-usuarios-admin');
        div.innerHTML = "";
        usuarios.forEach((item, index) => {
            div.innerHTML += `
                <div class="user-list-item">
                    <span><strong>${item.user}</strong> (${item.isAdmin ? 'Dono' : 'Comum'})</span>
                    ${!item.isAdmin ? `<button class="btn-delete" onclick="excluirUsuario(${index})">EXCLUIR</button>` : ''}
                </div>
            `;
        });
    }

    // --- CARREGAMENTO DE CONTEÚDO ---
    async function carregarCanais() {
        try {
            const res = await fetch(URL_M3U_GITHUB);
            listaM3U = res.ok ? await res.text() : "";
            parsearM3U();
            
            // Soma os filmes salvos manualmente no navegador
            const extras = JSON.parse(localStorage.getItem('filmesExtras') || "[]");
            extras.forEach(item => {
                if (!dadosAgrupados[item.categoria]) dadosAgrupados[item.categoria] = [];
                dadosAgrupados[item.categoria].push(item);
            });

            mostrarCategorias();
        } catch (e) {
            console.log("Erro GitHub, carregando apenas manuais.");
            mostrarCategorias();
        }
    }

    function parsearM3U() {
        const linhas = listaM3U.split('\n');
        dadosAgrupados = {};
        for (let i = 0; i < linhas.length; i++) {
            if (linhas[i].startsWith('#EXTINF')) {
                const url = linhas[i + 1]?.trim();
                if (url?.startsWith('http')) {
                    const cat = (linhas[i].match(/group-title="([^"]+)"/i)?.[1] || "GERAL").toUpperCase();
                    const nome = linhas[i].split(',').pop().trim();
                    const logo = linhas[i].match(/tvg-logo="([^"]+)"/i)?.[1] || "";
                    if (!dadosAgrupados[cat]) dadosAgrupados[cat] = [];
                    dadosAgrupados[cat].push({ nome, logo, url });
                }
            }
        }
    }

    // --- PLAYER E NAVEGAÇÃO ---
    function playVideo(url, nome) {
        const video = document.getElementById('video');
        const salvo = localStorage.getItem(`progresso_${nome}`);

        if (salvo && confirm(`Continuar assistindo "${nome}"?`)) {
            iniciarHls(url, parseFloat(salvo));
        } else {
            iniciarHls(url, 0);
        }

        video.ontimeupdate = () => {
            if (video.currentTime > 5) localStorage.setItem(`progresso_${nome}`, video.currentTime);
        };
    }

    function iniciarHls(url, tempo) {
        const v = document.getElementById('video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { v.currentTime = tempo; v.play(); });
        } else {
            v.src = url;
            v.onloadedmetadata = () => { v.currentTime = tempo; v.play(); };
        }
    }

    function mostrarCategorias() {
        document.getElementById('grid-categorias').style.display = 'grid';
        document.getElementById('grid-conteudo').style.display = 'none';
        document.getElementById('btn-voltar').style.display = 'none';
        document.getElementById('status-titulo').innerText = "Categorias";
        const grid = document.getElementById('grid-categorias');
        grid.innerHTML = "";
        Object.keys(dadosAgrupados).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = "btn-categoria";
            btn.innerHTML = `<span>${cat}</span> <span>${dadosAgrupados[cat].length}</span>`;
            btn.onclick = () => abrirCategoria(cat);
            grid.appendChild(btn);
        });
    }

    function abrirCategoria(cat) {
        document.getElementById('grid-categorias').style.display = 'none';
        document.getElementById('grid-conteudo').style.display = 'grid';
        document.getElementById('btn-voltar').style.display = 'block';
        document.getElementById('status-titulo').innerText = cat;
        const grid = document.getElementById('grid-conteudo');
        grid.innerHTML = "";
        dadosAgrupados[cat].forEach(item => {
            grid.innerHTML += `
                <div class="card" onclick="playVideo('${item.url}', '${item.nome}')">
                    <div class="card-img"><img src="${item.logo}" onerror="this.src='https://via.placeholder.com/150x220?text=Capa'"></div>
                    <div class="card-nome">${item.nome}</div>
                </div>
            `;
        });
    }

    function voltarParaCategorias() { mostrarCategorias(); }

    function abrirAdmin() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        renderizarListaUsuarios();
    }

    function fecharAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        carregarCanais();
    }

    function salvarNovoFilme() {
        const nome = document.getElementById('adm-nome').value;
        const cat = document.getElementById('adm-cat').value.toUpperCase() || "GERAL";
        const url = document.getElementById('adm-url').value;
        const logo = document.getElementById('adm-capa').value;
        if (!nome || !url) return alert("Nome e URL obrigatórios!");
        const extras = JSON.parse(localStorage.getItem('filmesExtras') || "[]");
        extras.push({ nome, categoria: cat, url, logo });
        localStorage.setItem('filmesExtras', JSON.stringify(extras));
        alert("Salvo!");
        fecharAdmin();
    }
</script>
</body>
</html>
