<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cloneflix</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; padding: 20px; }
        .admin-section { background: #1c1c1c; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* Estilo da Tabela de Usuários */
        .user-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .user-list th, .user-list td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .status-ativo { color: #28a745; font-weight: bold; }
        .status-suspenso { color: #ffc107; font-weight: bold; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; margin-right: 5px; }
    </style>
</head>
<body>

    <button class="btn-red" style="width: auto;" onclick="window.location.reload()">🔄 ATUALIZAR PAINEL</button>

    <div class="admin-section">
        <h3>Criar Novo Acesso</h3>
        <input type="text" id="adm-u" placeholder="Nome do Usuário">
        <input type="text" id="adm-p" placeholder="Senha">
        <button class="btn-red" id="btn-save-user">SALVAR NO FIREBASE</button>
    </div>

    <div class="admin-section">
        <h3>Usuários Cadastrados</h3>
        <table class="user-list">
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Senha</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-usuarios">
                </tbody>
        </table>
    </div>

    <div class="admin-section">
        <h3>Postar Conteúdo (M3U8)</h3>
        <input type="text" id="f-nome" placeholder="Nome do Filme">
        <input type="text" id="f-cat" placeholder="Categoria">
        <input type="text" id="f-url" placeholder="Link .m3u8">
        <input type="text" id="f-capa" placeholder="Link da Capa">
        <button class="btn-red" id="btn-save-content">PUBLICAR AGORA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Sua configuração das fotos
        const firebaseConfig = {
            apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo",
            authDomain: "cloneflix-16f9c.firebaseapp.com",
            projectId: "cloneflix-16f9c",
            storageBucket: "cloneflix-16f9c.firebasestorage.app",
            messagingSenderId: "424547428500",
            appId: "1:424547428500:web:df36775fea37db3d42ac81",
            databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FUNÇÃO PARA LISTAR USUÁRIOS EM TEMPO REAL ---
        const tabela = document.getElementById('tabela-usuarios');
        onValue(ref(db, 'usuarios'), (snapshot) => {
            tabela.innerHTML = ""; // Limpa a tabela antes de carregar
            snapshot.forEach((childSnapshot) => {
                const key = childSnapshot.key;
                const data = childSnapshot.val();
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.user}</td>
                    <td>${data.pass}</td>
                    <td class="${data.status === 'suspenso' ? 'status-suspenso' : 'status-ativo'}">
                        ${data.status || 'ativo'}
                    </td>
                    <td>
                        <button class="btn-action" style="background: #007bff;" id="btn-susp-${key}">
                            ${data.status === 'suspenso' ? 'Ativar' : 'Suspender'}
                        </button>
                        <button class="btn-action" style="background: #dc3545;" id="btn-del-${key}">Excluir</button>
                    </td>
                `;
                tabela.appendChild(tr);

                // Evento de Suspender/Ativar
                document.getElementById(`btn-susp-${key}`).onclick = () => {
                    const novoStatus = data.status === 'suspenso' ? 'ativo' : 'suspenso';
                    update(ref(db, `usuarios/${key}`), { status: novoStatus });
                };

                // Evento de Excluir
                document.getElementById(`btn-del-${key}`).onclick = () => {
                    if(confirm("Deseja realmente excluir este usuário?")) {
                        remove(ref(db, `usuarios/${key}`));
                    }
                };
            });
        });

        // --- SALVAR NOVO USUÁRIO ---
        document.getElementById('btn-save-user').onclick = () => {
            const user = document.getElementById('adm-u').value;
            const pass = document.getElementById('adm-p').value;
            if(user && pass) {
                push(ref(db, 'usuarios'), { user, pass, status: 'ativo' })
                .then(() => {
                    alert("Usuário criado!");
                    document.getElementById('adm-u').value = "";
                    document.getElementById('adm-p').value = "";
                });
            }
        };

        // --- SALVAR CONTEÚDO ---
        document.getElementById('btn-save-content').onclick = () => {
            const novoFilme = {
                nome: document.getElementById('f-nome').value,
                categoria: document.getElementById('f-cat').value,
                url: document.getElementById('f-url').value,
                capa: document.getElementById('f-capa').value
            };
            push(ref(db, 'conteudo'), novoFilme).then(() => alert("Conteúdo publicado!"));
        };
    </script>
</body>
</html>
