<div id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Painel de Controle</h2>
            <button class="btn-red" id="btn-close-admin" style="width:auto;">VOLTAR AO APP</button>
        </div>

        <div class="admin-box">
            <h3 id="form-title">Adicionar/Editar Conteúdo</h3>
            <input type="hidden" id="f-key"> <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="f-nome" placeholder="Título">
                <input type="text" id="f-cat" placeholder="Categoria (Ex: AÇÃO, TV)">
                <input type="text" id="f-url" placeholder="Link .m3u8">
                <input type="text" id="f-capa" placeholder="URL da Capa">
            </div>
            <button class="btn-red" id="btn-save-content">SALVAR ALTERAÇÕES / PUBLICAR</button>
            <button class="btn-red" id="btn-cancel-edit" style="display:none; background:#555;">CANCELAR EDIÇÃO</button>
        </div>

        <div class="admin-box">
            <h3>Meus Conteúdos (Filmes e Canais)</h3>
            <table style="width:100%; text-align:left; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid #444;">
                        <th>Título</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-conteudo"></tbody>
            </table>
        </div>

        <div class="admin-box">
            <h3>Gerenciar Acessos</h3>
            </div>
    </div>

    <script type="module">
        // ... importações e config do firebase (mantenha as suas chaves das fotos)
        
        // --- FUNÇÃO PARA SALVAR OU ATUALIZAR CONTEÚDO ---
        document.getElementById('btn-save-content').onclick = () => {
            const key = document.getElementById('f-key').value;
            const filme = {
                nome: document.getElementById('f-nome').value,
                categoria: document.getElementById('f-cat').value,
                url: document.getElementById('f-url').value,
                capa: document.getElementById('f-capa').value
            };

            if (key) {
                // Se tem key, estamos EDITANDO
                update(ref(db, `conteudo/${key}`), filme).then(() => {
                    alert("Atualizado com sucesso!");
                    limparFormFilme();
                });
            } else {
                // Se não tem key, estamos CRIANDO NOVO
                push(ref(db, 'conteudo'), filme).then(() => {
                    alert("Postado com sucesso!");
                    limparFormFilme();
                });
            }
        };

        // --- LISTAR CONTEÚDOS NO PAINEL ---
        onValue(ref(db, 'conteudo'), (snap) => {
            const tbody = document.getElementById('tabela-conteudo');
            tbody.innerHTML = "";
            snap.forEach(item => {
                const f = item.val();
                const k = item.key;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${f.nome}</td>
                    <td>${f.categoria}</td>
                    <td>
                        <button class="btn-sm" onclick="window.prepararEdicao('${k}', '${f.nome}', '${f.categoria}', '${f.url}', '${f.capa}')" style="background:#007bff">Editar</button>
                        <button class="btn-sm" onclick="window.delFilme('${k}')" style="background:red">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // --- PREPARAR FORMULÁRIO PARA EDIÇÃO ---
        window.prepararEdicao = (key, nome, cat, url, capa) => {
            document.getElementById('f-key').value = key;
            document.getElementById('f-nome').value = nome;
            document.getElementById('f-cat').value = cat;
            document.getElementById('f-url').value = url;
            document.getElementById('f-capa').value = capa;
            
            document.getElementById('form-title').innerText = "Editando: " + nome;
            document.getElementById('btn-cancel-edit').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        function limparFormFilme() {
            document.getElementById('f-key').value = "";
            document.getElementById('f-nome').value = "";
            document.getElementById('f-cat').value = "";
            document.getElementById('f-url').value = "";
            document.getElementById('f-capa').value = "";
            document.getElementById('form-title').innerText = "Adicionar/Editar Conteúdo";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        window.delFilme = (k) => confirm("Excluir este conteúdo?") && remove(ref(db, `conteudo/${k}`));
        document.getElementById('btn-cancel-edit').onclick = limparFormFilme;

        // ... restante das funções de usuário e login ...
    </script>
