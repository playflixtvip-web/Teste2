<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAINEL COMPLETO - CLONEFLIX</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0b0b0b; --red: #E50914; --card: #1a1a1a; --text: #fff; --gray: #2a2a2a; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #222; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: var(--gray); color: #fff; box-sizing: border-box; font-size: 14px; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #main-content { display: none; padding-top: 60px; }
        #player-area { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 60px; z-index: 900; }
        video { width: 100%; height: 100%; }
        .row { padding: 15px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        
        /* PAINEL ADM ESTILO CARD */
        #admin-panel { display: none; padding: 80px 15px 40px; background: #000; min-height: 100vh; }
        .admin-box { background: #141414; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #222; }
        h3 { color: var(--red); margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* TABELAS E BOTÕES DE AÇÃO */
        .tabela-container { overflow-x: auto; margin-top: 15px; background: #000; border-radius: 6px; padding: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #777; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
        .btn-acao { padding: 6px 10px; border-radius: 4px; border: none; color: #fff; cursor: pointer; font-size: 11px; font-weight: bold; margin-right: 4px; }
        .btn-green { background: #28a745; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center; background:#141414; padding:35px; border-radius:12px; border:1px solid #333; width:85%; max-width:350px;">
            <h1 style="color:var(--red); margin-bottom: 25px; letter-spacing: 2px;">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="b-e">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h2 style="color:var(--red); margin:0; font-size: 22px;">CLONEFLIX</h2>
            <button id="b-a" class="btn-red" style="display:none; width:auto; padding:6px 15px; font-size:11px;">PAINEL ADM</button>
        </header>
        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>
        <div id="vitrine"></div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="b-v" style="width:auto; margin-bottom:25px; background:#333">← VOLTAR AO APP</button>

        <div class="admin-box">
            <h3>Importar Lista (M3U / #EXTINF)</h3>
            <textarea id="m3u-i" rows="5" placeholder="Cole aqui o texto da sua lista M3U..."></textarea>
            <button class="btn-red btn-green" id="btn-imp">IMPORTAR TUDO AGORA</button>
        </div>

        <div class="admin-box">
            <h3>Gerenciar Usuários e Acessos</h3>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <input type="hidden" id="edit-user-id">
                <input id="a-u" placeholder="Nome do Usuário" style="flex:2; min-width:140px">
                <input id="a-p" placeholder="Senha" style="flex:1; min-width:100px">
                <input id="a-d" type="number" placeholder="Dias" style="width:80px">
                <button id="b-c-u" class="btn-red" style="width:100%">SALVAR OU RENOVAR ACESSO</button>
            </div>
            
            <div class="tabela-container">
                <p style="font-size: 11px; color: #666; margin: 10px 0;">Usuários Cadastrados:</p>
                <table>
                    <thead><tr><th>USUÁRIO</th><th>SENHA</th><th>RESTANTE</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-u"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h3 id="t-f">Adicionar Novo Conteúdo</h3>
            <input type="hidden" id="e-id">
            <input type="text" id="f-n" placeholder="Nome do Conteúdo">
            <input type="text" id="f-c" placeholder="Categoria (Ex: FILMES, CANAIS)">
            <input type="text" id="f-u" placeholder="Link do Stream (.m3u8)">
            <input type="text" id="f-p" placeholder="Link da Imagem da Capa">
            <button class="btn-red" id="b-s">PUBLICAR PARA TODOS</button>
        </div>

        <div class="admin-box">
            <h3>Meus Conteúdos (Filmes/Canais)</h3>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>TÍTULO</th><th>CATEGORIA</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-c"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // LOGIN COM TRAVA DE DATA
        document.getElementById('b-e').onclick = async () => {
            const user = document.getElementById('u-l').value;
            const pass = document.getElementById('p-l').value;
            if(user === "Rhuan" && pass === "2026") { logado(true); return; }

            const snap = await get(ref(db, 'usuarios'));
            let ok = false;
            snap.forEach(i => {
                const d = i.val();
                if(d.user === user && d.pass === pass) {
                    if(d.status !== 'ativo') { alert("Acesso Suspenso!"); return; }
                    if(d.expira !== "Vitalício" && new Date().getTime() > d.expira) { alert("Acesso Expirado!"); return; }
                    ok = true;
                }
            });
            if(ok) logado(false); else alert("Dados Inválidos!");
        };

        function logado(adm) {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            if(adm) document.getElementById('b-a').style.display='block';
            carregarTudo();
        }

        function carregarTudo() {
            // CONTEÚDOS (VITRINE E TABELA)
            onValue(ref(db, 'conteudo'), (s) => {
                const vit = document.getElementById('vitrine'); vit.innerHTML = "";
                const tabC = document.getElementById('l-c'); tabC.innerHTML = "";
                let cats = {};
                s.forEach(i => {
                    const d = i.val(); const k = i.key;
                    if(!cats[d.categoria]) cats[d.categoria] = []; cats[d.categoria].push(d);
                    tabC.innerHTML += `<tr><td>${d.nome}</td><td>${d.categoria}</td><td>
                        <button class="btn-acao" style="background:#007bff" onclick="window.editC('${k}')">EDIT</button>
                        <button class="btn-acao" style="background:red" onclick="window.delC('${k}')">X</button></td></tr>`;
                });
                for(let c in cats){
                    const r = document.createElement('div'); r.className='row'; r.innerHTML=`<div style="font-size:15px; font-weight:bold; margin-bottom:12px; color:#eee">${c}</div><div class="grid" id="g-${c.replace(/\s+/g, '')}"></div>`; vit.appendChild(r);
                    cats[c].forEach(f => {
                        const card = document.createElement('div'); card.className='card'; card.innerHTML=`<img src="${f.capa}"><div style="font-size:10px; text-align:center; padding:5px; white-space:nowrap; overflow:hidden;">${f.nome}</div>`;
                        card.onclick = () => { if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(document.getElementById('main-video')); hls.on(Hls.Events.MANIFEST_PARSED, ()=>document.getElementById('main-video').play()); } window.scrollTo(0,0); };
                        document.getElementById('g-'+c.replace(/\s+/g, '')).appendChild(card);
                    });
                }
            });

            // USUÁRIOS (TABELA COMPLETA)
            onValue(ref(db, 'usuarios'), (s) => {
                const tabU = document.getElementById('l-u'); tabU.innerHTML = "";
                s.forEach(i => {
                    const k = i.key; const v = i.val();
                    let resto = "Vitalício";
                    if(v.expira !== "Vitalício") {
                        const d = Math.ceil((v.expira - new Date().getTime()) / (1000*60*60*24));
                        resto = d > 0 ? d + " dias" : "EXPIRADO";
                    }
                    tabU.innerHTML += `<tr><td>${v.user}</td><td>${v.pass}</td><td style="color:${resto=='EXPIRADO'?'red':'#0f0'}">${resto}</td><td style="color:${v.status=='ativo'?'#28a745':'#f39c12'}">${v.status.toUpperCase()}</td><td>
                        <button class="btn-acao" style="background:#444" onclick="window.stU('${k}','${v.status}')">ST</button>
                        <button class="btn-acao" style="background:#007bff" onclick="window.editU('${k}')">EDIT</button>
                        <button class="btn-acao" style="background:red" onclick="window.delU('${k}')">X</button></td></tr>`;
                });
            });
        }

        // AÇÕES USUÁRIO
        document.getElementById('b-c-u').onclick = () => {
            const id = document.getElementById('edit-user-id').value;
            const user = document.getElementById('a-u').value;
            const pass = document.getElementById('a-p').value;
            const dias = document.getElementById('a-d').value;
            let exp = (dias && dias != "999") ? new Date().getTime() + (dias * 24 * 60 * 60 * 1000) : "Vitalício";
            const obj = { user, pass, expira: exp, status: 'ativo' };
            if(id) update(ref(db, `usuarios/${id}`), obj).then(()=>resetU());
            else push(ref(db, 'usuarios'), obj).then(()=>resetU());
        };
        window.editU = async (k) => { const d = (await get(ref(db, `usuarios/${k}`))).val(); document.getElementById('edit-user-id').value=k; document.getElementById('a-u').value=d.user; document.getElementById('a-p').value=d.pass; };
        window.delU = (k) => confirm("Excluir usuário?") && remove(ref(db, `usuarios/${k}`));
        window.stU = (k, s) => update(ref(db, `usuarios/${k}`), {status: s=='ativo'?'suspenso':'ativo'});
        function resetU() { document.getElementById('edit-user-id').value=""; document.getElementById('a-u').value=""; document.getElementById('a-p').value=""; document.getElementById('a-d').value=""; alert("Sucesso!"); }

        // AÇÕES CONTEÚDO
        document.getElementById('b-s').onclick = () => {
            const id = document.getElementById('e-id').value;
            const obj = { nome: document.getElementById('f-n').value, categoria: document.getElementById('f-c').value.toUpperCase(), url: document.getElementById('f-u').value, capa: document.getElementById('f-p').value };
            if(id) update(ref(db, `conteudo/${id}`), obj).then(()=> { document.getElementById('e-id').value=""; alert("Atualizado!"); });
            else push(ref(db, 'conteudo'), obj).then(()=>alert("Postado!"));
        };
        window.editC = async (k) => { const d = (await get(ref(db, `conteudo/${k}`))).val(); document.getElementById('e-id').value=k; document.getElementById('f-n').value=d.nome; document.getElementById('f-c').value=d.categoria; document.getElementById('f-u').value=d.url; document.getElementById('f-p').value=d.capa; window.scrollTo(0,400); };
        window.delC = (k) => confirm("Excluir?") && remove(ref(db, `conteudo/${k}`));

        // IMPORTAR M3U
        document.getElementById('btn-imp').onclick = async () => {
            const linhas = document.getElementById('m3u-i').value.split('\n'); let t = 0;
            for(let i=0; i<linhas.length; i++){
                if(linhas[i].includes('#EXTINF')){
                    const info = linhas[i]; const url = linhas[i+1]?.trim();
                    if(url && url.startsWith('http')){
                        const n = info.split(',')[1] || "S/N";
                        const c = info.includes('group-title="') ? info.split('group-title="')[1].split('"')[0] : "GERAL";
                        const p = info.includes('tvg-logo="') ? info.split('tvg-logo="')[1].split('"')[0] : "";
                        await push(ref(db, 'conteudo'), { nome: n.trim(), categoria: c.toUpperCase(), url: url, capa: p }); t++;
                    }
                }
            }
            alert(t + " Itens Importados!"); document.getElementById('m3u-i').value="";
        };

        document.getElementById('b-a').onclick = () => { document.getElementById('main-content').style.display='none'; document.getElementById('admin-panel').style.display='block'; };
        document.getElementById('b-v').onclick = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('main-content').style.display='block'; };
    </script>
</body>
</html>
