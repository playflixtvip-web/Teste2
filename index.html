<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0b0b0b; --red: #E50914; --card: #141414; --text: #fff; --gray: #2a2a2a; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #222; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: var(--gray); color: #fff; box-sizing: border-box; font-size: 14px; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #main-content { display: none; padding-top: 60px; }
        #player-area { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 60px; z-index: 900; }
        video { width: 100%; height: 100%; }
        
        /* ESTILO DAS CATEGORIAS (GRUPOS) */
        .category-header { background: #1a1a1a; padding: 15px 20px; margin: 5px 0; cursor: pointer; border-left: 4px solid var(--red); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .category-content { display: none; padding: 15px 20px; background: #080808; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        
        /* INFO DE VALIDADE */
        #user-info { padding: 10px 20px; font-size: 13px; color: #aaa; background: #111; border-bottom: 1px solid #222; }

        #admin-panel { display: none; padding: 80px 15px 40px; background: #000; min-height: 100vh; }
        .admin-box { background: #141414; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #222; }
        .tabela-container { overflow-x: auto; margin-top: 15px; background: #000; padding: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td, th { padding: 10px; border-bottom: 1px solid #1a1a1a; text-align: left; }
        .btn-acao { padding: 6px 10px; border-radius: 4px; border: none; color: #fff; cursor: pointer; font-size: 11px; margin-right: 4px; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center; background:#141414; padding:35px; border-radius:12px; border:1px solid #333; width:85%; max-width:350px;">
            <h1 style="color:var(--red); margin-bottom: 25px;">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="b-e">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h2 style="color:var(--red); margin:0;">CLONEFLIX</h2>
            <button id="b-a" class="btn-red" style="display:none; width:auto; padding:6px 15px; font-size:11px;">PAINEL ADM</button>
        </header>
        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>
        <div id="user-info">Aguardando login...</div>
        <div id="vitrine"></div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" id="b-v" style="width:auto; margin-bottom:25px; background:#333">← VOLTAR AO APP</button>
        
        <div class="admin-box">
            <h3>Importar Lista M3U</h3>
            <textarea id="m3u-i" rows="4" placeholder="Cole o #EXTINF aqui..."></textarea>
            <button class="btn-red" id="btn-imp" style="background:#28a745">IMPORTAR AGORA</button>
        </div>

        <div class="admin-box">
            <h3>Clientes</h3>
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <input type="hidden" id="edit-user-id">
                <input id="a-u" placeholder="Usuário" style="flex:2">
                <input id="a-p" placeholder="Senha" style="flex:1">
                <input id="a-d" type="number" placeholder="Dias" style="width:70px">
                <button id="b-c-u" class="btn-red">SALVAR</button>
            </div>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>USUÁRIO</th><th>SENHA</th><th>RESTANTE</th><th>STATUS</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-u"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h3>Conteúdos</h3>
            <input type="hidden" id="e-id">
            <input id="f-n" placeholder="Nome">
            <input id="f-c" placeholder="Categoria">
            <input id="f-u" placeholder="Link M3U8">
            <input id="f-p" placeholder="Link Capa">
            <button class="btn-red" id="b-s">PUBLICAR</button>
            <div class="tabela-container">
                <table>
                    <thead><tr><th>TÍTULO</th><th>CATEGORIA</th><th>AÇÕES</th></tr></thead>
                    <tbody id="l-c"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        document.getElementById('b-e').onclick = async () => {
            const user = document.getElementById('u-l').value;
            const pass = document.getElementById('p-l').value;
            if(user === "Rhuan" && pass === "2026") { logado(true, "ADMIN"); return; }

            const snap = await get(ref(db, 'usuarios'));
            let validUser = null;
            snap.forEach(i => {
                const d = i.val();
                if(d.user === user && d.pass === pass) validUser = d;
            });

            if(validUser) {
                if(validUser.status !== 'ativo') { alert("Acesso Suspenso!"); return; }
                if(validUser.expira !== "Vitalício" && new Date().getTime() > validUser.expira) { alert("Acesso Expirado!"); return; }
                
                let validadeTxt = "Vitalício";
                if(validUser.expira !== "Vitalício") {
                    const dias = Math.ceil((validUser.expira - new Date().getTime()) / (1000*60*60*24));
                    validadeTxt = dias + " dias restantes";
                }
                logado(false, validadeTxt);
            } else { alert("Login Inválido!"); }
        };

        function logado(adm, validade) {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            document.getElementById('user-info').innerHTML = `<b>Status do Acesso:</b> ${validade}`;
            if(adm) document.getElementById('b-a').style.display='block';
            carregar();
        }

        function carregar() {
            // VITRINE COM CATEGORIAS RETRÁTEIS
            onValue(ref(db, 'conteudo'), (s) => {
                const vit = document.getElementById('vitrine'); vit.innerHTML = "";
                const tabC = document.getElementById('l-c'); tabC.innerHTML = "";
                let cats = {};
                s.forEach(i => {
                    const d = i.val(); const k = i.key;
                    if(!cats[d.categoria]) cats[d.categoria] = []; cats[d.categoria].push({...d, k});
                    tabC.innerHTML += `<tr><td>${d.nome}</td><td>${d.categoria}</td><td><button class="btn-acao" style="background:#007bff" onclick="window.editC('${k}')">EDIT</button><button class="btn-acao" style="background:red" onclick="window.delC('${k}')">X</button></td></tr>`;
                });
                for(let c in cats){
                    const divCat = document.createElement('div');
                    divCat.innerHTML = `<div class="category-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'"><span>${c}</span> <span>▼</span></div><div class="category-content"><div class="grid" id="grid-${c.replace(/\s+/g, '')}"></div></div>`;
                    vit.appendChild(divCat);
                    cats[c].forEach(f => {
                        const card = document.createElement('div'); card.className='card'; card.innerHTML=`<img src="${f.capa}"><div style="font-size:10px; text-align:center; padding:5px;">${f.nome}</div>`;
                        card.onclick = () => { if(Hls.isSupported()){ const hls = new Hls(); hls.loadSource(f.url); hls.attachMedia(document.getElementById('main-video')); hls.on(Hls.Events.MANIFEST_PARSED, ()=>document.getElementById('main-video').play()); } window.scrollTo(0,0); };
                        document.getElementById(`grid-${c.replace(/\s+/g, '')}`).appendChild(card);
                    });
                }
            });

            onValue(ref(db, 'usuarios'), (s) => {
                const tabU = document.getElementById('l-u'); tabU.innerHTML = "";
                s.forEach(i => {
                    const k = i.key; const v = i.val();
                    let resto = v.expira === "Vitalício" ? "Vitalício" : Math.ceil((v.expira - new Date().getTime()) / (1000*60*60*24)) + " dias";
                    if(v.expira !== "Vitalício" && resto.split(' ')[0] <= 0) resto = "EXPIRADO";
                    tabU.innerHTML += `<tr><td>${v.user}</td><td>${v.pass}</td><td>${resto}</td><td>${v.status}</td><td><button class="btn-acao" style="background:#444" onclick="window.stU('${k}','${v.status}')">ST</button><button class="btn-acao" style="background:#007bff" onclick="window.editU('${k}')">EDIT</button><button class="btn-acao" style="background:red" onclick="window.delU('${k}')">X</button></td></tr>`;
                });
            });
        }

        // FUNÇÕES ADM (IGUAIS AO ANTERIOR)
        document.getElementById('b-c-u').onclick = () => {
            const id = document.getElementById('edit-user-id').value;
            const dias = document.getElementById('a-d').value;
            let exp = (dias && dias != "999") ? new Date().getTime() + (dias * 24 * 60 * 60 * 1000) : "Vitalício";
            const obj = { user: document.getElementById('a-u').value, pass: document.getElementById('a-p').value, expira: exp, status: 'ativo' };
            if(id) update(ref(db, `usuarios/${id}`), obj).then(()=>alert("Salvo!")); else push(ref(db, 'usuarios'), obj).then(()=>alert("Criado!"));
        };

        document.getElementById('btn-imp').onclick = async () => {
            const linhas = document.getElementById('m3u-i').value.split('\n');
            for(let i=0; i<linhas.length; i++){
                if(linhas[i].includes('#EXTINF')){
                    const url = linhas[i+1]?.trim();
                    const n = linhas[i].split(',')[1] || "S/N";
                    const c = linhas[i].includes('group-title="') ? linhas[i].split('group-title="')[1].split('"')[0] : "GERAL";
                    const p = linhas[i].includes('tvg-logo="') ? linhas[i].split('tvg-logo="')[1].split('"')[0] : "";
                    await push(ref(db, 'conteudo'), { nome: n.trim(), categoria: c.toUpperCase(), url: url, capa: p });
                }
            }
            alert("Importado!"); document.getElementById('m3u-i').value="";
        };

        window.editU = async (k) => { const d = (await get(ref(db, `usuarios/${k}`))).val(); document.getElementById('edit-user-id').value=k; document.getElementById('a-u').value=d.user; document.getElementById('a-p').value=d.pass; };
        window.delU = (k) => confirm("Excluir?") && remove(ref(db, `usuarios/${k}`));
        window.stU = (k, s) => update(ref(db, `usuarios/${k}`), {status: s=='ativo'?'suspenso':'ativo'});
        window.editC = async (k) => { const d = (await get(ref(db, `conteudo/${k}`))).val(); document.getElementById('e-id').value=k; document.getElementById('f-n').value=d.nome; document.getElementById('f-c').value=d.categoria; document.getElementById('f-u').value=d.url; document.getElementById('f-p').value=d.capa; window.scrollTo(0,400); };
        window.delC = (k) => confirm("Excluir?") && remove(ref(db, `conteudo/${k}`));
        document.getElementById('b-s').onclick = () => {
            const id = document.getElementById('e-id').value;
            const obj = { nome: document.getElementById('f-n').value, categoria: document.getElementById('f-c').value.toUpperCase(), url: document.getElementById('f-u').value, capa: document.getElementById('f-p').value };
            if(id) update(ref(db, `conteudo/${id}`), obj).then(()=>alert("Salvo!")); else push(ref(db, 'conteudo'), obj);
        };
        document.getElementById('b-a').onclick = () => { document.getElementById('main-content').style.display='none'; document.getElementById('admin-panel').style.display='block'; };
        document.getElementById('b-v').onclick = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('main-content').style.display='block'; };
    </script>
</body>
</html>
